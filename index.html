<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RX Cart | Premium India</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        body { font-family: 'Roboto', sans-serif; background: #f1f3f6; }
        .fk-blue { background: #2874f0; }
        .fk-orange { background: #fb641b; }
        .page { display: none; min-height: 100vh; }
        .page.active { display: block; }
        .error-shake { animation: shake 0.4s; border-bottom: 2px solid #ff0000 !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

    <header id="main-nav" class="fk-blue sticky top-0 z-50 px-4 py-2 hidden">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <h1 onclick="showPage('home-page')" class="text-white font-bold italic text-xl cursor-pointer">RX<span class="text-yellow-400">Cart</span></h1>
            <div class="flex items-center gap-4 text-white font-bold text-sm">
                <button onclick="showPage('track-page')">Orders</button>
                <button onclick="logout()" class="bg-blue-700 px-3 py-1 rounded">Logout</button>
            </div>
        </div>
    </header>

    <div id="auth-page" class="page flex items-center justify-center bg-slate-200 p-4">
        <div class="bg-white w-full max-w-4xl flex rounded-sm overflow-hidden shadow-2xl min-h-[500px]">
            <div class="fk-blue w-2/5 p-10 flex flex-col justify-between hidden md:flex text-white">
                <div><h2 class="text-3xl font-bold">Login</h2><p class="mt-4 text-blue-100">Get access to your Orders and Recommendations</p></div>
                <img src="https://static-assets-web.flixcart.com/fk-p-linchpin-web/fk-cp-zion/img/login_img_c4a81e.png">
            </div>
            <div class="w-full md:w-3/5 p-10 flex flex-col justify-center">
                <div id="login-section">
                    <div id="input-container" class="border-b border-slate-300 mb-2">
                        <label class="text-xs text-slate-400">Mobile Number or Email</label>
                        <input type="text" id="login-id" placeholder="Enter details" class="w-full py-2 outline-none text-lg">
                    </div>
                    <p id="error-msg" class="text-red-600 text-[11px] font-bold mb-6 hidden">Invalid details</p>
                    <button onclick="sendOTP()" class="fk-orange w-full text-white py-3 font-bold rounded-sm shadow-md uppercase mb-4">Request OTP</button>
                </div>
                <div id="otp-section" class="hidden text-center">
                    <input type="number" id="otp-val" class="w-full border-b-2 border-blue-600 py-2 outline-none text-2xl text-center tracking-widest mb-6" placeholder="000000">
                    <button onclick="verifyOTP()" class="fk-blue w-full text-white py-3 font-bold rounded-sm uppercase">Verify</button>
                </div>
            </div>
        </div>
    </div>

    <div id="home-page" class="page p-4 max-w-7xl mx-auto">
        <div class="bg-white p-4 shadow-sm">
            <h3 class="font-bold mb-4 uppercase text-slate-400 text-xs">Recommended for You</h3>
            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        </div>
    </div>

    <div id="checkout-page" class="page max-w-4xl mx-auto p-4 mt-10">
        <div class="bg-white p-8 shadow-2xl flex flex-col md:flex-row gap-10">
            <div class="flex-1 text-center">
                <h3 class="font-bold text-blue-600 mb-4">SCAN & PAY</h3>
                <img id="qr-image" src="" class="w-64 h-64 mx-auto object-contain border rounded-lg" onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=RX-PAY'">
                <button onclick="downloadQR()" class="text-blue-600 text-xs font-bold underline mt-4 block mx-auto"><i class="fa-solid fa-download"></i> Download QR</button>
                <p class="text-2xl font-black mt-4">₹<span id="pay-amt">0</span></p>
            </div>
            <div class="flex-1 space-y-4">
                <h4 class="font-bold border-b pb-2">Confirm Payment</h4>
                <input type="text" id="screenshot-link" placeholder="Paste Screenshot Link (Imgur/PostImages)" class="w-full border p-2 text-sm outline-none">
                <button id="finish-btn" onclick="finishOrder()" class="fk-orange w-full text-white py-4 font-bold rounded-sm uppercase">Confirm Order</button>
            </div>
        </div>
    </div>

    <div id="track-page" class="page max-w-xl mx-auto p-4 mt-10">
        <div id="order-status-container" class="bg-white p-8 shadow-sm"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJhsLPA8SEgar8F4tWk641FiEk9q9dwGw",
            authDomain: "rxcart-1fdbd.firebaseapp.com",
            projectId: "rxcart-1fdbd",
            storageBucket: "rxcart-1fdbd.firebasestorage.app",
            appId: "1:828440432642:web:57ccba1ba4fa6f07c9971b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let activeItem = null;
        let currentOTP = null;

        // --- AUTH CHECKER ---
        const init = () => {
            const isLogged = localStorage.getItem('rx_logged');
            if (isLogged === 'true') {
                showPage('home-page');
                loadData();
                syncTracking();
            } else {
                showPage('auth-page');
            }
        };

        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active');
            
            const nav = document.getElementById('main-nav');
            id === 'auth-page' ? nav.classList.add('hidden') : nav.classList.remove('hidden');
        };

        // --- OTP LOGIC ---
        window.sendOTP = () => {
            currentOTP = Math.floor(100000 + Math.random() * 900000);
            alert("Your OTP is: " + currentOTP); // Temporary for testing
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('otp-section').classList.remove('hidden');
        };

        window.verifyOTP = () => {
            if(document.getElementById('otp-val').value == currentOTP) {
                localStorage.setItem('rx_logged', 'true');
                location.reload(); // Force refresh to trigger clean init()
            } else { alert("Wrong OTP!"); }
        };

        window.logout = () => { localStorage.removeItem('rx_logged'); location.reload(); };

        // --- PRODUCT SYNC ---
        const loadData = async () => {
            const snap = await getDocs(collection(db, "products"));
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                grid.innerHTML += `
                    <div onclick="buy('${p.name}','${p.price}','${p.img}')" class="bg-white border p-2 cursor-pointer hover:shadow-md text-center">
                        <img src="${p.img}" class="h-32 w-full object-contain mb-2">
                        <p class="text-[11px] font-bold line-clamp-1">${p.name}</p>
                        <p class="font-bold text-sm text-blue-600">₹${p.price}</p>
                    </div>`;
            });
        };

        // --- TRACKING SYNC ---
        const syncTracking = () => {
            const q = query(collection(db, "orders"), orderBy("timestamp", "desc"), limit(1));
            onSnapshot(q, (snap) => {
                snap.forEach(d => {
                    const o = d.data();
                    const s = o.status || 'pending';
                    const sColor = s === 'verified' ? 'bg-green-600' : (s === 'rejected' ? 'bg-red-600' : 'bg-yellow-500');
                    const sText = s === 'verified' ? 'Payment Verified' : (s === 'rejected' ? 'Payment Rejected' : 'Verification Pending');

                    document.getElementById('order-status-container').innerHTML = `
                        <div class="flex gap-4 mb-8">
                            <img src="${o.img}" class="w-20 h-20 object-contain border">
                            <div><p class="font-bold">${o.name}</p><p class="text-xs text-blue-600 font-bold">Order ID: ${d.id.slice(-5)}</p></div>
                        </div>
                        <div class="border-l-2 border-slate-200 ml-4 pl-6 space-y-10 relative">
                            <div class="flex items-center"><div class="absolute -left-[9px] w-4 h-4 ${sColor} rounded-full border-2 border-white"></div><p class="text-sm font-bold">${sText}</p></div>
                            <div class="flex items-center opacity-20"><div class="absolute -left-[9px] w-4 h-4 bg-slate-300 rounded-full"></div><p class="text-sm">Shipped</p></div>
                        </div>`;
                });
            });
        };

        // --- QR SYNC ---
        onSnapshot(doc(db, "settings", "payment"), (docSnap) => {
            if (docSnap.exists()) document.getElementById('qr-image').src = docSnap.data().qr_url;
        });

        window.buy = (n, p, i) => { activeItem = { n, p, i }; document.getElementById('pay-amt').innerText = p; showPage('checkout-page'); };
        
        window.finishOrder = async () => {
            const link = document.getElementById('screenshot-link').value;
            if(!link) return alert("Paste screenshot link");
            await addDoc(collection(db, "orders"), { name: activeItem.n, price: activeItem.p, img: activeItem.i, screenshot: link, status: 'pending', timestamp: Date.now() });
            showPage('track-page');
            syncTracking();
        };

        // Start everything
        window.onload = init;
    </script>
</body>
</html>
